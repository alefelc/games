server {
  listen 80;
  server_name _;
  server_tokens off;
  root /usr/share/nginx/html;
  index index.html;
  include /etc/nginx/security-headers.conf;

  # Mismo origen para la dirección adaptativa. Evita que el navegador dependa
  # de CORS, del subdominio exacto o de variables Vite antiguas en una PWA.
  location /api/game-master/ {
    proxy_pass https://gm.teanimas.com/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_ssl_server_name on;
    proxy_ssl_name gm.teanimas.com;
    proxy_set_header Host gm.teanimas.com;
    # La llamada ya llegó por el mismo origen del frontend. No reenviar el
    # Origin del navegador evita falsos 403 si cambia el dominio público.
    proxy_set_header Origin "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 8s;
    proxy_send_timeout 50s;
    proxy_read_timeout 50s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 12s;
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store" always;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location = /build-info.json {
    default_type application/json;
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|svg|webp|woff2)$ {
    expires 1y;
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    default_type application/manifest+json;
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache" always;
  }

  location = /sw.js {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-cache" always;
  }
}
